<div>
    <label for="{{ field.id_for_label }}" class="block text-sm font-medium text-slate-700 mb-1">{{ field.label }}{% if field.field.required %} *{% endif %}</label>
    {{ field }}
    {% if field.help_text %}<p class="mt-1 text-xs text-slate-500">{{ field.help_text }}</p>{% endif %}
    {% for err in field.errors %}<p class="mt-1 text-sm text-red-600">{{ err }}</p>{% endfor %}
</div>
